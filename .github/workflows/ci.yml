name: CI

on:
  pull_request:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  quality:
    name: Lint · Typecheck · Build · Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Verify release artifacts
        run: pnpm check:release

      - name: Test
        run: pnpm test

      - name: Documentation
        run: pnpm check:docs

  vite-e2e:
    name: Vite browser to CLI E2E
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup

      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Vite E2E
        run: pnpm check:e2e

  compatibility:
    name: Compatibility · ${{ matrix.profile }} · Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - profile: minimum
            node: 22.12.0
          - profile: current
            node: 24
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup
        with:
          node-version: ${{ matrix.node }}

      - name: Build packages
        run: pnpm build

      - name: Verify dependency compatibility
        run: node scripts/check-compatibility.mjs --profile ${{ matrix.profile }}
