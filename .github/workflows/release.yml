name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: read

jobs:
  quality:
    name: Quality gate
    uses: ./.github/workflows/ci.yml

  release:
    name: Version or Publish
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup
        uses: ./.github/actions/setup
        with:
          # Writes the .npmrc the publish step authenticates against via OIDC.
          registry-url: "https://registry.npmjs.org"

      # ci:publish uses `npm publish`, and OIDC trusted publishing needs npm >= 11.5.1 (newer than Node 22 bundles).
      - name: Upgrade npm for trusted publishing
        run: npm install --global npm@latest

      - name: Create Release Pull Request or Publish
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          # ci:publish shells to `npm publish` instead of pnpm, whose OIDC path 404s (pnpm/pnpm#11513).
          publish: pnpm ci:publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
