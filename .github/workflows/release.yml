name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: read

jobs:
  quality:
    name: Quality gate
    uses: ./.github/workflows/ci.yml

  release:
    name: Version or Publish
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup
        uses: ./.github/actions/setup
        with:
          registry-url: "https://registry.npmjs.org"

      # OIDC trusted publishing forces provenance, which require()s a bundled `sigstore` module npm 11.9+/12 dropped while still importing it. 11.5.1 is the last release that bundles it — pin until npm fixes the regression.
      - name: Pin npm with working trusted-publishing provenance
        run: npm install --global npm@11.5.1

      # Opens/updates the Version Packages PR while changesets are pending; hasChangesets flips to false once that PR merges.
      - name: Version
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Publish via npm (pnpm's OIDC path 404s — pnpm/pnpm#11513) once no changesets remain. OIDC auth + provenance come from the job's id-token permission and the Trusted Publisher registered on npm.
      - name: Publish to npm
        if: steps.changesets.outputs.hasChangesets == 'false'
        run: |
          pnpm build
          for manifest in packages/*/package.json; do
            name=$(node -p "require('./$manifest').name || ''")
            version=$(node -p "require('./$manifest').version || ''")
            isPrivate=$(node -p "require('./$manifest').private === true")
            if [ -z "$name" ] || [ "$isPrivate" = "true" ]; then
              continue
            fi
            if npm view "$name@$version" version >/dev/null 2>&1; then
              echo "$name@$version already published — skipping"
            else
              echo "Publishing $name@$version"
              ( cd "$(dirname "$manifest")" && npm publish --access public )
            fi
          done
