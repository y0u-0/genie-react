name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: read

jobs:
  quality:
    name: Quality gate
    uses: ./.github/workflows/ci.yml

  release:
    name: Version or Publish
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup
        uses: ./.github/actions/setup
        with:
          # Writes the .npmrc the publish step authenticates against via OIDC.
          registry-url: "https://registry.npmjs.org"

      # OIDC trusted publishing needs npm >= 11.5.1 and forces provenance, which require()s a bundled `sigstore` module that npm 11.9+/12 dropped (libnpmpublish still imports it). 11.5.1 is the last release that bundles it — pin it until npm fixes the regression.
      - name: Pin npm with working trusted-publishing provenance
        run: npm install --global npm@11.5.1

      - name: Create Release Pull Request or Publish
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          # ci:publish shells to `npm publish` instead of pnpm, whose OIDC path 404s (pnpm/pnpm#11513).
          publish: pnpm ci:publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
