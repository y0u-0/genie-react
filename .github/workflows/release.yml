name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: read

jobs:
  quality:
    name: Quality gate
    uses: ./.github/workflows/ci.yml

  release:
    name: Version or Publish
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup
        uses: ./.github/actions/setup

      - name: Create Release Pull Request or Publish
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # pnpm runs the publish and auto-generates a provenance attestation under OIDC, but its sigstore path fails to resolve; disable provenance so OIDC trusted publishing still authenticates and ships.
          NPM_CONFIG_PROVENANCE: "false"
