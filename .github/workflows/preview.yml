name: Preview Release

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: preview-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: Publish preview to pkg.pr.new
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup
        uses: ./.github/actions/setup

      - name: Build
        run: pnpm build

      - name: Publish preview packages
        run: pnpm exec pkg-pr-new publish --compact --pnpm ./packages/genie-react ./packages/cli
