name: Setup
description: Install pnpm and Node, then restore dependencies from the lockfile.

inputs:
  registry-url:
    description: npm registry to authenticate against (only needed for publishing).
    required: false
    default: ""
  node-version:
    description: Node version override for compatibility jobs; defaults to .nvmrc.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@v4

    - name: Setup Node from .nvmrc
      if: inputs.node-version == ''
      uses: actions/setup-node@v4
      with:
        node-version-file: .nvmrc
        cache: pnpm
        registry-url: ${{ inputs.registry-url }}

    - name: Setup requested Node version
      if: inputs.node-version != ''
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: pnpm
        registry-url: ${{ inputs.registry-url }}

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
